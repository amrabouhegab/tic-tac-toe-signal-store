<div class="relative group">
  <!-- Elevation Shadow -->
  <div
    class="absolute -inset-4 bg-black/40 blur-3xl rounded-xl opacity-50 group-hover:opacity-70 transition-opacity duration-700"
  ></div>
  <!-- The Board Plate -->
  <div class="relative bg-surface-container p-2 rounded-lg shadow-2xl border border-primary/20">
    <div class="board-grid">
      @for (row of gameBoard(); let x = $index; track $index) {
        @for (cell of row; let y = $index; track $index) {
          <button
            class="cursor-pointer w-24 h-24 md:w-32 md:h-32 bg-surface-container-low hover:bg-surface-container-high active:scale-[0.98] transition-all duration-300 flex items-center justify-center rounded-sm"
            (click)="onCellClick(x, y)"
          >
            <span class="font-headline text-5xl marker-gradient-x select-none">{{ cell }}</span>
          </button>
        }
      }
    </div>
  </div>
  <!-- Asymmetric Decoration -->
  <div
    class="absolute -bottom-12 -right-12 w-32 h-32 border-r border-b border-primary/40 pointer-events-none hidden md:block"
  ></div>
  <div
    class="absolute -top-6 -left-6 text-[8px] tracking-[0.5em] uppercase text-white/40 font-bold rotate-90 origin-top-left pointer-events-none"
  >
    Ref. No. MCMXXIV
  </div>
</div>
