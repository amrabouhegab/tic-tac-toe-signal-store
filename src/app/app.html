<app-header />

<main class="flex-grow flex items-center justify-center px-6 py-20 relative overflow-hidden">
  <!-- Subtle Ambient Background Element -->
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"
  ></div>
  <div class="relative w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">
    <!-- Left Side: Editorial Content & Setup -->
    <div class="lg:col-span-5 space-y-12">
      <div class="space-y-4">
        <p class="text-[10px] tracking-[0.4em] uppercase font-bold text-slate-100" style="">
          Current Match
        </p>
        <h1
          class="font-headline text-6xl md:text-7xl tracking-tight leading-tight text-white"
          style=""
        >
          The Duel of <br />
          <span class="italic text-primary" style="">Wits</span>
        </h1>
      </div>
      <!-- Setup Section / Turn Indicator Pill -->
      <div class="space-y-10">
        <div
          class="inline-flex items-center px-5 py-2.5 bg-surface-container-highest rounded-full shadow-lg border border-primary/30"
        >
          <span class="w-2 h-2 rounded-full bg-primary animate-pulse mr-3"></span>
          <span class="font-label text-xs tracking-widest uppercase text-white" style=""
            >X's Move</span
          >
        </div>
        <div class="space-y-8">
          <!-- Player 1 Static Display -->
          <app-player-input symbol="X" name="Player 1" />
          <!-- Player 2 Static Display -->
          <app-player-input symbol="O" name="Player 2" />
        </div>
        <!-- Action Buttons -->
        <div class="flex flex-col space-y-4 pt-4">
          <button
            class="bg-primary text-on-primary-fixed py-5 rounded-sm font-label text-xs tracking-[0.3em] uppercase hover:bg-primary/90 active:scale-[0.98] transition-all duration-300 font-bold shadow-xl shadow-primary/10"
          >
            Begin Duel
          </button>
          <button
            class="font-label text-[10px] tracking-[0.2em] uppercase text-white/60 hover:text-primary transition-all duration-300 flex items-center group justify-center"
          >
            Reset Board
            <span
              class="material-symbols-outlined ml-2 text-sm group-hover:rotate-180 transition-transform duration-500"
              data-icon="refresh"
              >refresh</span
            >
          </button>
        </div>
      </div>
    </div>
    <!-- Right Side: The Game Board Plate -->
    <div class="lg:col-span-7 flex justify-center lg:justify-end">
      <app-game-board />
    </div>
  </div>
</main>

<!-- Footer -->
<app-footer />

<!-- Glassmorphic Winner Overlay (Hidden by Default) -->
<app-winner-modal />
